# .github/workflows/pipeline.yml
name: ML Validation & Deployment Pipeline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  # ──────────────────────────────────────
  # Job 1: Validate — Train & log to MLflow
  # ──────────────────────────────────────
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install scikit-learn dvc

      - name: Pull Data with DVC
        run: dvc pull

      - name: Train Model
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: python train_gan.py

      - name: Upload model_info.txt
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt

  # ──────────────────────────────────────
  # Job 2: Deploy — Check threshold & mock build
  # ──────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install scikit-learn dvc

      - name: Download model_info.txt
        uses: actions/download-artifact@v4
        with:
          name: model-info

      - name: Check Accuracy Threshold
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: python check_threshold.py

      - name: Mock Docker Build
        run: echo "Building Docker image for Run ID:$(cat model_info.txt)"
