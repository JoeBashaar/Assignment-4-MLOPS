# .github/workflows/pipeline.yml
name: ML Validation & Deployment Pipeline

on:
  push:
    branches:
      - dev
  pull_request:

jobs:
  # ──────────────────────────────────────
  # Job 1: Validate — Train & log to MLflow
  # ──────────────────────────────────────
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Pull Data with DVC
        run: dvc pull
        continue-on-error: true

      - name: Download Dataset (fallback)
        run: |
          if [ ! -f fashion-mnist_train.csv ]; then
            python -c "
          import torchvision, pandas as pd, numpy as np
          ds = torchvision.datasets.FashionMNIST(root='./tmp', train=True, download=True)
          imgs = ds.data.numpy().reshape(-1, 784)
          labels = ds.targets.numpy()
          df = pd.DataFrame(imgs, columns=[f'pixel{i+1}' for i in range(784)])
          df.insert(0, 'label', labels)
          df.to_csv('fashion-mnist_train.csv', index=False)
          print(f'Downloaded {len(df)} samples')
          "
          fi

      - name: Train Model
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: python train_gan.py

      - name: Upload model_info.txt
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt

  # ──────────────────────────────────────
  # Job 2: Deploy — Check threshold & mock build
  # ──────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Download model_info.txt
        uses: actions/download-artifact@v4
        with:
          name: model-info

      - name: Check Accuracy Threshold
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: python check_threshold.py

      - name: Mock Docker Build
        run: echo "Building Docker image for Run ID:$(cat model_info.txt)"
