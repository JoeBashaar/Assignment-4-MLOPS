# .github/workflows/pipeline.yml
name: ML Validation & Deployment Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ──────────────────────────────────────
  # Job 1: Linter — Lightweight checks
  # ──────────────────────────────────────
  linter: 
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Linter Check
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Model Dry Test
        run: |
          python -c "import torch; print('Model environment ready!')"

  # ──────────────────────────────────────
  # Job 2: Train — Expensive GPU job with conditions
  # ──────────────────────────────────────
  train:
    runs-on: ubuntu-latest
    needs: linter
    if: contains(github.event.head_commit.message, '[run-train]')

    steps: 
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install dvc

      - name: Pull Data with DVC
        run: |
          dvc init --no-scm
          dvc pull
        continue-on-error: true

      - name: Download Dataset (fallback)
        run: |
          if [ ! -f fashion-mnist_train.csv ]; then
            python -c "
          import torchvision, pandas as pd, numpy as np
          ds = torchvision.datasets.FashionMNIST(root='./tmp', train=True, download=True)
          imgs = ds.data.numpy().reshape(-1, 784)
          labels = ds.targets.numpy()
          df = pd.DataFrame(imgs, columns=[f'pixel{i+1}' for i in range(784)])
          df.insert(0, 'label', labels)
          df.to_csv('fashion-mnist_train.csv', index=False)
          print(f'Downloaded {len(df)} samples')
          "
          fi

      - name: Train Model
        run: python train_gan.py

      - name: Upload model_info.txt
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt

      - name: Upload MLflow Database
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-db
          path: mlflow.db

      - name: On Failure - Upload Error Logs
        if: failure()
        run: |
          echo "Training failed. Capturing error logs..." > error_logs.txt
          echo "Job: ${{ github.job }}" >> error_logs.txt
          echo "Run ID: ${{ github.run_id }}" >> error_logs.txt
          echo "Commit: ${{ github.sha }}" >> error_logs.txt
          # Add more logs if available

      - name: Upload Error Logs Artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: error_logs.txt

      - name: Cleanup
        if: always()
        run: echo "Cleaning up temporary cloud volumes..."

  # ──────────────────────────────────────
  # Job 3: Deploy — Check threshold & mock build
  # ──────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: train

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Download model_info.txt
        uses: actions/download-artifact@v4
        with:
          name: model-info

      - name: Download MLflow Database
        uses: actions/download-artifact@v4
        with:
          name: mlflow-db

      - name: Check Accuracy Threshold
        run: python check_threshold.py

      - name: Mock Docker Build
        run: echo "Building Docker image for Run ID:$(cat model_info.txt)"
